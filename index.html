<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b1018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DermaScores">
<meta name="description" content="DermaScores — clinical dermatology severity scoring calculators for clinicians.">
<title>DermaScores</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"DermaScores","short_name":"DermaScores","start_url":".","display":"standalone","background_color":"%230b1018","theme_color":"%230b1018"}'>
<style>
:root{
  --bg:#0b1018; --bg2:#0e1622; --surface:#141f31; --surface2:#1b2841;
  --line:#27374f; --text:#e9eef7; --muted:#94a4be; --faint:#6b7c98;
  --accent:#5b8cff; --accent2:#34d8c4;
  --ok:#34d399; --warn:#fbbf24; --bad:#fb7185; --info:#60a5fa;
  --r:16px; --r2:12px;
  --sh:0 10px 30px rgba(0,0,0,.40);
  color-scheme:dark;
}
.light{
  --bg:#eef1f6; --bg2:#e6ebf2; --surface:#ffffff; --surface2:#f4f6fb;
  --line:#dde3ec; --text:#101a2c; --muted:#5b6b86; --faint:#8a98ae;
  --sh:0 10px 28px rgba(25,45,85,.10);
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 100% -10%,rgba(91,140,255,.10),transparent),
                   radial-gradient(700px 500px at -10% 0%,rgba(52,216,196,.08),transparent);
  background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
h1,h2,h3{line-height:1.25}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand svg{width:34px;height:34px;flex:none;border-radius:10px;box-shadow:0 4px 12px rgba(91,140,255,.35)}
.brand .nm{font-weight:800;font-size:19px;letter-spacing:-.3px}
.brand .nm b{color:var(--accent)}
.hbtns{display:flex;gap:8px}
.iconbtn{
  display:flex;align-items:center;justify-content:center;
  min-width:42px;height:42px;padding:0 12px;border-radius:12px;
  background:var(--surface);border:1px solid var(--line);
  font-weight:700;font-size:14px;transition:.15s;
}
.iconbtn:active{transform:scale(.93)}
.iconbtn:hover{border-color:var(--accent)}

/* ---------- Layout ---------- */
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 40px}

/* ---------- Home ---------- */
.hero{margin:6px 2px 18px}
.hero h1{font-size:clamp(24px,6vw,34px);font-weight:850;letter-spacing:-.6px}
.hero p{color:var(--muted);margin-top:5px;font-size:14.5px}
.search{position:relative;margin:14px 0}
.search input{
  width:100%;height:50px;padding:0 16px 0 46px;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;
  color:var(--text);font-size:15.5px;outline:none;transition:.15s;
}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.18)}
.search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--faint)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;-ms-overflow-style:none;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:650;white-space:nowrap;
  background:var(--surface);border:1px solid var(--line);color:var(--muted);transition:.15s;
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:active{transform:scale(.95)}

.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));margin-top:6px}
.ccard{
  text-align:left;padding:15px;border-radius:var(--r);
  background:var(--surface);border:1px solid var(--line);
  border-left:3px solid var(--cc,var(--accent));
  transition:.15s;display:flex;flex-direction:column;gap:5px;min-height:118px;
}
.ccard:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--cc,var(--accent))}
.ccard:active{transform:scale(.97)}
.ccard .ab{font-size:19px;font-weight:850;letter-spacing:-.4px}
.ccard .fn{font-size:12.5px;color:var(--muted);flex:1}
.ccard .tg{
  align-self:flex-start;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:3px 8px;border-radius:6px;color:var(--cc,var(--accent));
  background:color-mix(in srgb,var(--cc,var(--accent)) 16%,transparent);
}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}

/* ---------- Detail ---------- */
.back{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--muted);font-weight:650;font-size:14px;padding:8px 0;margin-bottom:4px;
}
.back:hover{color:var(--accent)}
.dhead h1{font-size:27px;font-weight:850;letter-spacing:-.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dhead .tg{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:4px 9px;border-radius:7px;color:var(--cc);
  background:color-mix(in srgb,var(--cc) 16%,transparent);
}
.dhead .dfull{color:var(--muted);font-size:14.5px;margin-top:3px}
details.about{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2)}
details.about summary{
  padding:11px 14px;font-weight:650;font-size:13.5px;color:var(--muted);
  cursor:pointer;list-style:none;display:flex;align-items:center;gap:7px;
}
details.about summary::-webkit-details-marker{display:none}
details.about summary::before{content:"ⓘ";color:var(--accent);font-size:15px}
details.about[open] summary{border-bottom:1px solid var(--line)}
details.about .ab-body{padding:12px 14px;font-size:13.5px;color:var(--muted)}
details.about .ab-body .rg{margin-top:8px;color:var(--text);font-weight:650;font-size:13px}

.ptrow{margin:14px 0 4px}
.ptrow input{
  width:100%;height:46px;padding:0 14px;background:var(--surface);
  border:1px dashed var(--line);border-radius:var(--r2);color:var(--text);font-size:14.5px;outline:none;
}
.ptrow input:focus{border-style:solid;border-color:var(--accent)}

/* ---------- Form blocks ---------- */
.blocks{display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));margin:14px 0 0}
.block{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;
}
.block.full{grid-column:1/-1}
.block .bt{font-weight:750;font-size:15px;margin-bottom:3px}
.block .bn{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.block .bn:last-child{margin-bottom:0}
.fields{display:grid;gap:11px}
.fields.c2{grid-template-columns:1fr 1fr}
.fields.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:520px){.fields.c3{grid-template-columns:1fr 1fr}}
.fld{display:flex;flex-direction:column;gap:5px}
.fld>span{font-size:13px;font-weight:600;color:var(--muted)}
.fld>span b{color:var(--accent);font-weight:800}
.fld small{font-size:11.5px;color:var(--faint)}
.fld select,.fld input[type=number]{
  width:100%;height:44px;padding:0 12px;border-radius:11px;
  background:var(--surface2);border:1px solid var(--line);color:var(--text);
  font-size:15px;outline:none;transition:.12s;
}
.fld select:focus,.fld input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.16)}
.fld input[type=range]{width:100%;height:44px;accent-color:var(--accent);background:transparent}

/* ---------- Result bar ---------- */
.resultbar{
  position:sticky;bottom:0;z-index:40;margin-top:16px;
  background:color-mix(in srgb,var(--surface) 94%,transparent);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);
  padding:13px 15px calc(13px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.rb-score{display:flex;flex-direction:column;line-height:1.05}
.rb-score .lb{font-size:10.5px;font-weight:750;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.rb-score .vl{font-size:34px;font-weight:850;letter-spacing:-1px}
.rb-mid{flex:1;min-width:140px;display:flex;flex-direction:column;gap:7px}
.pill{
  align-self:flex-start;padding:5px 12px;border-radius:999px;font-weight:750;font-size:13px;
  border:1px solid transparent;
}
.pill.b-ok{background:color-mix(in srgb,var(--ok) 20%,transparent);border-color:color-mix(in srgb,var(--ok) 55%,transparent);color:var(--ok)}
.pill.b-warn{background:color-mix(in srgb,var(--warn) 20%,transparent);border-color:color-mix(in srgb,var(--warn) 55%,transparent);color:var(--warn)}
.pill.b-bad{background:color-mix(in srgb,var(--bad) 20%,transparent);border-color:color-mix(in srgb,var(--bad) 55%,transparent);color:var(--bad)}
.pill.b-info{background:color-mix(in srgb,var(--info) 20%,transparent);border-color:color-mix(in srgb,var(--info) 55%,transparent);color:var(--info)}
.parts{display:flex;gap:6px;flex-wrap:wrap}
.parts span{
  font-size:11.5px;font-weight:650;padding:3px 8px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--line);color:var(--muted);
}
.rb-act{display:flex;gap:7px}
.actbtn{
  width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--line);transition:.13s;
}
.actbtn svg{width:19px;height:19px}
.actbtn:hover{border-color:var(--accent);color:var(--accent)}
.actbtn:active{transform:scale(.9)}
.actbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}

/* ---------- Footer ---------- */
footer{
  max-width:920px;margin:24px auto 0;padding:18px 18px calc(28px + env(safe-area-inset-bottom));
  border-top:1px solid var(--line);text-align:center;
}
footer .disc{font-size:11.5px;color:var(--faint);line-height:1.6;max-width:560px;margin:0 auto}
footer .disc b{color:var(--muted)}
footer .sig{margin-top:12px;font-size:12px;color:var(--faint);font-weight:650;letter-spacing:.3px}

/* ---------- Toast ---------- */
#toast{
  position:fixed;left:50%;bottom:24px;transform:translate(-50%,28px);
  background:var(--text);color:var(--bg);font-weight:700;font-size:13.5px;
  padding:11px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:.25s;z-index:200;box-shadow:var(--sh);
}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* ---------- Background surgical-instrument texture ---------- */
.bg-deco{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-deco svg{position:absolute;color:var(--text);opacity:.05}
.light .bg-deco svg{opacity:.075}
@media(max-width:600px){.bg-deco svg{scale:.6}}

/* ---------- Print ---------- */
#printArea{display:none}
@media print{
  header,.resultbar,footer,#toast,.back,.about,.ptrow,.search,.chips,.bg-deco{display:none!important}
  body{background:#fff;color:#000}
  #app{display:none}
  #printArea{display:block;padding:0 6px}
  .pr-h{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px}
  .pr-h .t{font-size:20px;font-weight:800}
  .pr-meta{font-size:12px;color:#333;margin-bottom:14px;line-height:1.7}
  .pr-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px}
  .pr-tbl td{border:1px solid #999;padding:6px 9px}
  .pr-tbl td:last-child{text-align:right;font-weight:700;width:90px}
  .pr-sec{font-weight:800;font-size:13px;background:#eee;padding:6px 9px;border:1px solid #999;border-bottom:none}
  .pr-score{font-size:16px;font-weight:800;margin:10px 0;padding:10px;border:2px solid #000}
  .pr-disc{font-size:10px;color:#555;margin-top:18px;border-top:1px solid #999;padding-top:8px}
}
</style>
</head>

    <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">

<script>
"use strict";
/* =====================================================================
   DermaScores — clinical dermatology scoring calculators
   Single file · zero dependencies · offline-ready
   ===================================================================== */

/* ---------- state ---------- */
const state={lang:"tr",theme:"dark",view:"home",calc:null,query:"",cat:"all"};

/* ---------- i18n helper ---------- */
const t=(tr,en)=>state.lang==="tr"?tr:en;

/* ---------- UI strings ---------- */
const UI={
  tagline:["Klinik dermatoloji şiddet skorlama araçları","Clinical dermatology severity scoring tools"],
  search:["Skor ara…","Search scores…"],
  all:["Tümü","All"],
  none:["Sonuç bulunamadı","No scores found"],
  back:["Geri","Back"],
  about:["Bilgi & yorumlama","About & interpretation"],
  range:["Aralık","Range"],
  patient:["Hasta adı / no — rapor için (opsiyonel)","Patient name / ID — for report (optional)"],
  score:["Skor","Score"],
  reset:["Sıfırla","Reset"],
  copy:["Kopyala","Copy"],
  print:["PDF / Yazdır","PDF / Print"],
  copied:["Sonuç panoya kopyalandı","Result copied to clipboard"],
  cleared:["Alanlar sıfırlandı","Inputs reset"],
  disc:["<b>Tıbbi sorumluluk reddi.</b> Bu uygulama yalnızca eğitim ve klinik karar desteği amaçlıdır; profesyonel tıbbi değerlendirmenin yerine geçmez. Sonuçları hastanın klinik bağlamında yorumlayınız.",
        "<b>Medical disclaimer.</b> This app is for education and clinical decision support only and is not a substitute for professional medical judgment. Interpret all results within the patient's clinical context."],
  reportTitle:["DermaScores — Klinik Skor Raporu","DermaScores — Clinical Score Report"],
  date:["Tarih","Date"],
  result:["Sonuç","Result"],
  interp:["Yorum","Interpretation"]
};

/* ---------- categories ---------- */
const CATS={
  pso :["Psoriazis","Psoriasis","#5b8cff"],
  ecz :["Egzama","Eczema","#34d8c4"],
  acne:["Akne","Acne","#f59e0b"],
  hs  :["Hidradenitis","Hidradenitis","#f472b6"],
  urt :["Ürtiker","Urticaria","#a78bfa"],
  pig :["Pigmentasyon","Pigmentation","#22d3ee"],
  hair:["Saç","Hair","#fb923c"],
  bul :["Büllöz","Bullous","#fbbf24"],
  ctd :["Bağ dokusu","Connective tissue","#818cf8"],
  ctcl:["Kutanöz lenfoma","Cutaneous lymphoma","#c084fc"],
  emg :["Acil","Emergency","#fb7185"],
  itch:["Kaşıntı","Pruritus","#4ade80"],
  gen :["Genel","General","#94a3b8"],
  im  :["Dahiliye","Internal medicine","#2dd4bf"]
};

/* ---------- builders & math helpers ---------- */
const gr=(a,b)=>{if(b===undefined){b=a;a=0;}const o=[];for(let i=a;i<=b;i++)o.push([i,String(i)]);return o;};
const num=(id,label,o={})=>({type:"num",id,label,min:o.min??0,max:o.max??100,step:o.step??1,val:o.val??0,hint:o.hint});
const sel=(id,label,opts,o={})=>({type:"sel",id,label,opts,val:o.val??(Array.isArray(opts[0])?opts[0][0]:opts[0]),hint:o.hint});
const rng=(id,label,o={})=>({type:"rng",id,label,min:o.min??0,max:o.max??10,step:o.step??1,val:o.val??0});
const blk=(title,items,o={})=>({title,items,note:o.note,full:o.full,cols:o.cols});
const note=txt=>({note:txt,items:[],full:true});

/* PASI/EASI/PSSI involved-area grade (0–6) as a % range dropdown */
const areaOpts=()=>[0,1,2,3,4,5,6].map(n=>[n,t(
  ["0 — %0 (yok)","1 — <%10","2 — %10–29","3 — %30–49","4 — %50–69","5 — %70–89","6 — %90–100"][n],
  ["0 — 0% (none)","1 — <10%","2 — 10–29%","3 — 30–49%","4 — 50–69%","5 — 70–89%","6 — 90–100%"][n])]);
/* severity band: arr of [upperInclusive,cls,tr,en]; last entry catches the rest */

{
 id:"CrCl",cat:"im",name:"CrCl",
 full:["Kreatinin Klirensi (Cockcroft–Gault)","Creatinine Clearance (Cockcroft–Gault)"],
 about:["İlaç doz ayarlamasında yaygın kullanılan böbrek fonksiyonu tahmini. CrCl = [(140 − yaş) × ağırlık × (kadında 0.85)] / (72 × serum kreatinin). Sonuç mL/dk olarak verilir.",
        "An estimate of renal function widely used for drug dose adjustment. CrCl = [(140 − age) × weight × (0.85 if female)] / (72 × serum creatinine). Result is in mL/min."],
 form(){
   return [blk(t("Hasta verileri","Patient data"),[
     num("age",t("Yaş (yıl)","Age (years)"),{max:120}),
     num("wt",t("Vücut ağırlığı (kg)","Body weight (kg)"),{max:400,step:0.1}),
     sel("sex",t("Cinsiyet","Sex"),[["m",t("Erkek","Male")],["f",t("Kadın","Female")]]),
     num("cr",t("Serum kreatinin (mg/dL)","Serum creatinine (mg/dL)"),{max:25,step:0.01})
   ],{cols:2})];
 },
 calc(v){
   const age=+v("age"),wt=+v("wt"),cr=+v("cr"),f=v("sex")==="f";
   if(age<=0||wt<=0||cr<=0)return{score:0,fmt:"—"};
   const s=((140-age)*wt*(f?0.85:1))/(72*cr);
   return {score:s,fmt:s.toFixed(1)+t(" mL/dk"," mL/min"),
     band:band(s,[[14.99,"bad","Böbrek yetmezliği","Kidney failure"],[29.99,"bad","Ağır azalma","Severely decreased"],[59.99,"warn","Orta azalma","Moderately decreased"],[89.99,"ok","Hafif azalma","Mildly decreased"],[Infinity,"ok","Normal","Normal"]])};
 }
},

/* ---- eGFR (CKD-EPI 2021) ---- */
{
 id:"eGFR",cat:"im",name:"eGFR",
 full:["Tahmini GFH (CKD-EPI 2021)","Estimated GFR (CKD-EPI 2021)"],
 about:["Kronik böbrek hastalığını evrelemek için kullanılan 2021 ırktan bağımsız CKD-EPI kreatinin denklemi. Sonuç mL/dk/1.73m². KDIGO evreleri: G1 ≥90, G2 60–89, G3a 45–59, G3b 30–44, G4 15–29, G5 <15.",
        "The 2021 race-free CKD-EPI creatinine equation used to stage chronic kidney disease. Result in mL/min/1.73m². KDIGO categories: G1 ≥90, G2 60–89, G3a 45–59, G3b 30–44, G4 15–29, G5 <15."],
 form(){
   return [blk(t("Hasta verileri","Patient data"),[
     num("age",t("Yaş (yıl)","Age (years)"),{max:120}),
     sel("sex",t("Cinsiyet","Sex"),[["m",t("Erkek","Male")],["f",t("Kadın","Female")]]),
     num("cr",t("Serum kreatinin (mg/dL)","Serum creatinine (mg/dL)"),{max:25,step:0.01})
   ])];
 },
 calc(v){
   const age=+v("age"),cr=+v("cr"),f=v("sex")==="f";
   if(age<=0||cr<=0)return{score:0,fmt:"—"};
   const k=f?0.7:0.9,a=f?-0.241:-0.302;
   const e=142*Math.pow(Math.min(cr/k,1),a)*Math.pow(Math.max(cr/k,1),-1.200)*Math.pow(0.9938,age)*(f?1.012:1);
   return {score:e,fmt:Math.round(e)+t(" mL/dk/1.73m²"," mL/min/1.73m²"),
     band:band(e,[[14.99,"bad","G5 — Böbrek yetmezliği","G5 — Kidney failure"],[29.99,"bad","G4 — Ağır azalma","G4 — Severely decreased"],[44.99,"warn","G3b — Orta-ağır azalma","G3b — Moderately-severely decreased"],[59.99,"warn","G3a — Hafif-orta azalma","G3a — Mildly-moderately decreased"],[89.99,"ok","G2 — Hafif azalma","G2 — Mildly decreased"],[Infinity,"ok","G1 — Normal / yüksek","G1 — Normal or high"]])};
 }
},

/* ---- MELD-Na ---- */
{
 id:"MELD-Na",cat:"im",name:"MELD-Na",
 full:["MELD-Na Karaciğer Hastalığı Skoru","MELD-Na End-Stage Liver Disease Score"],
 about:["Son dönem karaciğer hastalığında kısa dönem mortaliteyi öngören ve transplantasyon önceliklendirmesinde kullanılan skor. Laboratuvar değerleri <1.0 ise 1.0 alınır; kreatinin en çok 4.0; sodyum 125–137 ile sınırlandırılır. Sonuç 6–40.",
        "A score predicting short-term mortality in end-stage liver disease, used for transplant prioritization. Lab values <1.0 are set to 1.0; creatinine is capped at 4.0; sodium is bounded 125–137. Result 6–40."],
 range:"6–40",
 form(){
   return [blk(t("Laboratuvar","Laboratory"),[
     num("bil",t("Total bilirubin (mg/dL)","Total bilirubin (mg/dL)"),{max:80,step:0.1}),
     num("inr",t("INR","INR"),{max:20,step:0.1}),
     num("cr",t("Serum kreatinin (mg/dL)","Serum creatinine (mg/dL)"),{max:25,step:0.1}),
     num("na",t("Serum sodyum (mmol/L)","Serum sodium (mmol/L)"),{val:137,min:100,max:170,step:1}),
     sel("dial",t("Son 1 haftada ≥ 2 kez diyaliz","Dialysis ≥ 2× in the last week"),[[0,t("Hayır","No")],[1,t("Evet","Yes")]])
   ],{cols:2})];
 },
 calc(v){
   const rb=+v("bil"),ri=+v("inr"),rc=+v("cr"),rn=+v("na");
   if(rb<=0||ri<=0||rc<=0||rn<=0)return{score:0,fmt:"—"};
   let bil=Math.max(rb,1),inr=Math.max(ri,1),cr=Math.max(rc,1);
   if(v("dial")==="1")cr=4;
   cr=Math.min(cr,4);
   let meld=Math.round(3.78*Math.log(bil)+11.2*Math.log(inr)+9.57*Math.log(cr)+6.43);
   const na=clamp(rn,125,137);
   let mn=meld;
   if(meld>11)mn=meld+1.32*(137-na)-0.033*meld*(137-na);
   mn=Math.round(clamp(mn,6,40));
   return {score:mn,fmt:String(mn),
     parts:[["MELD",String(meld)]],
     band:band(mn,[[9,"ok","Düşük (3 ay mortalite ≈ %2)","Low (≈2% 3-mo mortality)"],[19,"warn","Orta (≈ %6)","Moderate (≈6%)"],[29,"bad","Yüksek (≈ %20)","High (≈20%)"],[Infinity,"bad","Çok yüksek (> %50)","Very high (>50%)"]])};
 }
},

const app=document.getElementById("app");
const findCalc=id=>CALCS.find(c=>c.id===id);
const esc=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove("show"),2000);
}

/* ---------- render router ---------- */
function render(){
  document.documentElement.lang=state.lang;
  document.getElementById("langBtn").textContent=state.lang==="tr"?"TR":"EN";
  document.getElementById("themeBtn").textContent=state.theme==="dark"?"☾":"☀";
  document.getElementById("disc").innerHTML=t(...UI.disc);
  if(state.view==="detail"&&findCalc(state.calc))renderDetail();
  else renderHome();
  window.scrollTo(0,0);
}

/* ---------- home ---------- */
function renderHome(){
  const q=state.query.trim().toLowerCase();
  const cats=["all",...Object.keys(CATS).filter(k=>CALCS.some(c=>c.cat===k))];
  const list=CALCS.filter(c=>{
    if(state.cat!=="all"&&c.cat!==state.cat)return false;
    if(!q)return true;
    const hay=(c.name+" "+c.full.join(" ")+" "+CATS[c.cat].join(" ")).toLowerCase();
    return hay.includes(q);
  });
  app.innerHTML=`
    <div class="wrap">
      <div class="hero">
        <h1>DermaScores</h1>
        <p>${esc(t(...UI.tagline))} · ${CALCS.length} ${t("hesaplayıcı","calculators")}</p>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="q" placeholder="${esc(t(...UI.search))}" value="${esc(state.query)}" autocomplete="off">
      </div>
      <div class="chips">
        ${cats.map(k=>`<button class="chip ${state.cat===k?"on":""}" data-cat="${k}">${
          k==="all"?esc(t(...UI.all)):esc(t(CATS[k][0],CATS[k][1]))}</button>`).join("")}
      </div>
      ${list.length?`<div class="grid">${list.map(cardHTML).join("")}</div>`
        :`<div class="empty">${esc(t(...UI.none))}</div>`}
    </div>`;

  const qi=document.getElementById("q");
  qi.oninput=()=>{state.query=qi.value;renderHome();};
  qi.onkeydown=e=>{if(e.key==="Enter")qi.blur();};
  app.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{state.cat=b.dataset.cat;renderHome();});
  app.querySelectorAll(".ccard").forEach(b=>b.onclick=()=>openCalc(b.dataset.id));
}
function cardHTML(c){
  const col=CATS[c.cat][2];
  return `<button class="ccard" data-id="${c.id}" style="--cc:${col}">
    <span class="ab">${esc(c.name)}</span>
    <span class="fn">${esc(t(...c.full))}</span>
    <span class="tg">${esc(t(CATS[c.cat][0],CATS[c.cat][1]))}</span>
  </button>`;
}
function openCalc(id){state.view="detail";state.calc=id;render();}
function goHome(){state.view="home";state.calc=null;render();}

/* ---------- detail ---------- */
function renderDetail(){
  const c=findCalc(state.calc),col=CATS[c.cat][2];
  const blocks=c.form()||[];
  app.innerHTML=`
    <div class="wrap" style="--cc:${col}">
      <button class="back" id="back">‹ ${esc(t(...UI.back))}</button>
      <div class="dhead">
        <h1>${esc(c.name)} <span class="tg">${esc(t(CATS[c.cat][0],CATS[c.cat][1]))}</span></h1>
        <div class="dfull">${esc(t(...c.full))}</div>
        <details class="about">
          <summary>${esc(t(...UI.about))}</summary>
          <div class="ab-body">${esc(t(...c.about))}
            ${c.range?`<div class="rg">${esc(t(...UI.range))}: ${esc(c.range)}</div>`:""}</div>
        </details>
      </div>
      <div class="ptrow"><input id="ptName" placeholder="${esc(t(...UI.patient))}" autocomplete="off"></div>
      <form id="calcForm" class="blocks">${blocks.map(blockHTML).join("")}</form>
      <div class="resultbar">
        <div class="rb-score">
          <span class="lb">${esc(t(...UI.score))}</span>
          <span class="vl" id="scoreVal">0</span>
        </div>
        <div class="rb-mid">
          <span class="pill b-info" id="bandPill" style="display:none"></span>
          <div class="parts" id="parts"></div>
        </div>
        <div class="rb-act">
          <button class="actbtn" id="resetBtn" title="${esc(t(...UI.reset))}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v5h5"/></svg></button>
          <button class="actbtn" id="copyBtn" title="${esc(t(...UI.copy))}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2.5"/><path d="M6 15H4.5A1.5 1.5 0 0 1 3 13.5v-9A1.5 1.5 0 0 1 4.5 3h9A1.5 1.5 0 0 1 15 4.5V6"/></svg></button>
          <button class="actbtn primary" id="printBtn" title="${esc(t(...UI.print))}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><rect x="6" y="14" width="12" height="7"/><path d="M6 17H3v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6h-3"/></svg></button>
        </div>
      </div>
    </div>`;

  document.getElementById("back").onclick=goHome;
  const form=document.getElementById("calcForm");
  form.addEventListener("input",e=>{
    const id=e.target.dataset.id;
    if(id){const o=form.querySelector(`[data-out="${id}"]`);if(o)o.textContent=e.target.value;}
    update();
  });
  document.getElementById("resetBtn").onclick=()=>{renderDetail();toast(t(...UI.cleared));};
  document.getElementById("copyBtn").onclick=copyResult;
  document.getElementById("printBtn").onclick=printResult;
  update();
}

function blockHTML(b){
  const cls="block"+(b.full?" full":"");
  let h=`<div class="${cls}">`;
  if(b.title)h+=`<div class="bt">${esc(b.title)}</div>`;
  if(b.note)h+=`<div class="bn">${esc(b.note)}</div>`;
  if(b.items&&b.items.length){
    const c=b.cols===3?" c3":b.cols===2?" c2":"";
    h+=`<div class="fields${c}">${b.items.map(itemHTML).join("")}</div>`;
  }
  return h+`</div>`;
}
function itemHTML(it){
  if(it.type==="sel"){
    const opts=it.opts.map(o=>{const[val,lbl]=Array.isArray(o)?o:[o,o];
      return `<option value="${esc(val)}"${String(val)===String(it.val)?" selected":""}>${esc(lbl)}</option>`;}).join("");
    return `<label class="fld"><span>${esc(it.label)}</span>
      <select data-id="${it.id}">${opts}</select>
      ${it.hint?`<small>${esc(it.hint)}</small>`:""}</label>`;
  }
  if(it.type==="rng"){
    return `<label class="fld"><span>${esc(it.label)}: <b data-out="${it.id}">${it.val}</b></span>
      <input type="range" data-id="${it.id}" min="${it.min}" max="${it.max}" step="${it.step}" value="${it.val}"></label>`;
  }
  return `<label class="fld"><span>${esc(it.label)}</span>
    <input type="number" data-id="${it.id}" min="${it.min}" max="${it.max}" step="${it.step}" value="${it.val}" inputmode="decimal">
    ${it.hint?`<small>${esc(it.hint)}</small>`:""}</label>`;
}

/* read a field value */
function fieldVal(id){
  const e=document.querySelector(`#calcForm [data-id="${id}"]`);
  return e?e.value:"0";
}

/* ---------- compute & paint ---------- */
function update(){
  const c=findCalc(state.calc);
  let r;
  try{r=c.calc(fieldVal)||{};}catch(err){r={score:0};}
  document.getElementById("scoreVal").textContent=r.fmt!==undefined?r.fmt:r.score;
  const bp=document.getElementById("bandPill");
  if(r.band){bp.style.display="";bp.textContent=r.band.txt;bp.className="pill b-"+r.band.cls;}
  else bp.style.display="none";
  const pe=document.getElementById("parts");
  pe.innerHTML=(r.parts||[]).map(p=>`<span>${esc(p[0])}: <b>${esc(p[1])}</b></span>`).join("");
  update._last=r;
}

/* gather labelled values from the form for report/copy */
function gatherInputs(){
  const rows=[];
  document.querySelectorAll("#calcForm .block").forEach(blk=>{
    const sec=blk.querySelector(".bt");
    const flds=[...blk.querySelectorAll(".fld")];
    if(!flds.length)return;
    rows.push({sec:sec?sec.textContent:"",fields:flds.map(f=>{
      const ctrl=f.querySelector("[data-id]");
      let lbl=f.querySelector("span").textContent.trim();
      let val="";
      if(ctrl.tagName==="SELECT")val=ctrl.options[ctrl.selectedIndex].textContent;
      else val=ctrl.value;
      lbl=lbl.replace(/:\s*[\d.]+$/,"");
      return[lbl,val];
    })});
  });
  return rows;
}

function resultText(){
  const c=findCalc(state.calc),r=update._last||{};
  const pt=document.getElementById("ptName").value.trim();
  let s=`DermaScores — ${c.name} (${t(...c.full)})\n`;
  if(pt)s+=`${t("Hasta","Patient")}: ${pt}\n`;
  s+=`${t(...UI.date)}: ${new Date().toLocaleString()}\n\n`;
  gatherInputs().forEach(g=>{
    if(g.sec)s+=`[${g.sec}]\n`;
    g.fields.forEach(f=>s+=`  ${f[0]}: ${f[1]}\n`);
  });
  s+=`\n${t(...UI.result)}: ${r.fmt!==undefined?r.fmt:r.score}`;
  if(c.range)s+=`  (${t(...UI.range)} ${c.range})`;
  if(r.band)s+=`\n${t(...UI.interp)}: ${r.band.txt}`;
  if(r.parts&&r.parts.length)s+=`\n${r.parts.map(p=>p[0]+": "+p[1]).join("  ·  ")}`;
  return s;
}

function copyResult(){
  const txt=resultText();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast(t(...UI.copied)),()=>fallbackCopy(txt));
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea");ta.value=txt;
  ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);
  ta.select();try{document.execCommand("copy");toast(t(...UI.copied));}catch(e){}
  document.body.removeChild(ta);
}

/* ---------- print report ---------- */
function printResult(){
  const c=findCalc(state.calc),r=update._last||{};
  const pt=document.getElementById("ptName").value.trim();
  let rows="";
  gatherInputs().forEach(g=>{
    if(g.sec)rows+=`<tr><td class="pr-sec" colspan="2">${esc(g.sec)}</td></tr>`;
    g.fields.forEach(f=>rows+=`<tr><td>${esc(f[0])}</td><td>${esc(f[1])}</td></tr>`);
  });
  document.getElementById("printArea").innerHTML=`
    <div class="pr-h">
      <div class="t">DermaScores</div>
      <div style="text-align:right;font-size:12px">${esc(t(...UI.reportTitle))}</div>
    </div>
    <div class="pr-meta">
      <b>${esc(c.name)}</b> — ${esc(t(...c.full))}<br>
      ${pt?t("Hasta","Patient")+": "+esc(pt)+"<br>":""}
      ${esc(t(...UI.date))}: ${esc(new Date().toLocaleString())}
    </div>
    <table class="pr-tbl">${rows}</table>
    <div class="pr-score">
      ${esc(t(...UI.result))}: ${esc(r.fmt!==undefined?r.fmt:r.score)}${c.range?"  ·  "+esc(t(...UI.range))+" "+esc(c.range):""}
      ${r.band?"<br>"+esc(t(...UI.interp))+": "+esc(r.band.txt):""}
      ${r.parts&&r.parts.length?'<br><span style="font-size:12px;font-weight:600">'+r.parts.map(p=>esc(p[0]+": "+p[1])).join("  ·  ")+'</span>':""}
    </div>
    <div class="pr-disc">${t(...UI.disc).replace(/<\/?b>/g,"")}</div>`;
  window.print();
}

/* ---------- header controls ---------- */
document.getElementById("brand").onclick=goHome;
document.getElementById("langBtn").onclick=()=>{state.lang=state.lang==="tr"?"en":"tr";render();};
document.getElementById("themeBtn").onclick=()=>{
  state.theme=state.theme==="dark"?"light":"dark";
  document.body.classList.toggle("light",state.theme==="light");
  document.querySelector('meta[name=theme-color]').content=state.theme==="dark"?"#0b1018":"#eef1f6";
  render();
};

/* ---------- start ---------- */
render();
</script>
</body>
</html>
